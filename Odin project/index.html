<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Index Page</title>
</head>
<body>

    <a href="https://www.theodinproject.com/lessons/foundations-links-and-images" target ="_blank" rel="noreferrer" > Links and images in the ODIN project</a>
    <!-- rel is used to define the relation between the tab opened and the current tab.  -->
    <!-- target is for where the href link will open, whether the current tab or a new tab -->
     <br><br>

    <a href="./odin.html" target="_blank">ODIN Page</a>  
    <!-- ./  at the start of the path refers to the current directory -->
 
        <br><br>
     <img src="https://www.theodinproject.com/mstile-310x310.png" alt="ODIN Logo" height="250">
    <!-- alt is used for words incase link doesn't work,and also for accessibility -->
    <!-- src is for specifying the image source -->
    <!-- height is for specifying the height of the image.Image maintains aspect ratio and decrease width accordingly -->
</body>
</html>
